services:
  lara_app:
    build:
      context: ../docker/php
      dockerfile: Dockerfile
    container_name: alikassa_laravel_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - postgres
    networks:
      - alikassa_network

  nginx:
    image: nginx:alpine
    container_name: alikassa_nginx_server
    volumes:
      - .:/var/www
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - lara_app
    networks:
      - alikassa_network

  postgres:
    image: postgres:15
    container_name: alikassa_postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - alikassa_pgdata:/var/lib/postgresql/data
    networks:
      - alikassa_network

networks:
  alikassa_network:
    driver: bridge

volumes:
  alikassa_pgdata:
